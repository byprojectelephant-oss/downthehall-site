<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1000px;
    height: 1500px;
    background: #F5F0E8;
    font-family: Arial, sans-serif;
    color: #3D2E1E;
  }
  .pin {
    width: 1000px;
    height: 1500px;
    position: relative;
    overflow: hidden;
    padding: 74px 72px;
    background:
      radial-gradient(circle at 86% 9%, #F0EBF8 0 190px, transparent 191px),
      radial-gradient(circle at 10% 89%, #F0EBF8 0 220px, transparent 221px),
      #F5F0E8;
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
  }
  .logo {
    width: 270px;
    height: 66px;
    object-fit: contain;
    background: #fff;
    border-radius: 12px;
    padding: 6px 10px;
    box-shadow: 0 8px 20px rgba(61,46,30,.08);
  }
  .free {
    background: #7C6599;
    color: #fff;
    border-radius: 999px;
    padding: 13px 23px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: .02em;
  }
  .content {
    margin-top: 118px;
  }
  .eyebrow {
    color: #7C6599;
    font-size: 23px;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 800;
    margin-bottom: 28px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 90px;
    line-height: .98;
    letter-spacing: -2px;
    margin: 0 0 36px;
    max-width: 830px;
  }
  .subtitle {
    font-size: 35px;
    line-height: 1.25;
    color: #5C4433;
    max-width: 790px;
    margin-bottom: 54px;
  }
  .card {
    background: #fff;
    border: 2px solid rgba(61,46,30,.1);
    border-radius: 28px;
    padding: 42px 46px;
    box-shadow: 0 18px 40px rgba(61,46,30,.09);
  }
  .card-title {
    font-size: 30px;
    font-weight: 800;
    margin-bottom: 24px;
  }
  ul {
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 22px;
    list-style: none;
  }
  li {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 27px;
    font-weight: 700;
    line-height: 1.2;
  }
  li::before {
    content: "";
    width: 18px;
    height: 18px;
    flex: 0 0 18px;
    border-radius: 50%;
    background: #7C6599;
  }
  .cta {
    position: absolute;
    left: 72px;
    right: 72px;
    bottom: 96px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
  }
  .url {
    font-size: 23px;
    color: #5C4433;
    word-break: break-word;
  }
  .button {
    background: #3D2E1E;
    color: #F5F0E8;
    border-radius: 14px;
    padding: 22px 30px;
    font-size: 26px;
    font-weight: 800;
    white-space: nowrap;
  }
  .stripe {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 22px;
    background: #7C6599;
  }
</style>
</head>
